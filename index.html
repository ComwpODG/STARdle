<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC/ORDLE — Star Conflict Ship Guesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#040914;
    --bg-1:#081733;
    --panel:#0d1e42;
    --panel-line:#1b3568;
    --accent:#4fd8ff;
    --accent-dim:#2a6d8a;
    --good:#39e07a;
    --bad:#ff5468;
    --text:#dce8ff;
    --text-dim:#7c93c4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% -10%, #133063 0%, transparent 55%),
      radial-gradient(ellipse at 90% 10%, #0f2a56 0%, transparent 45%),
      linear-gradient(180deg,var(--bg-0),var(--bg-1) 60%,var(--bg-0));
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    display:flex;
    justify-content:center;
    padding:32px 16px 80px;
  }
  .wrap{width:100%;max-width:900px;}
  header{text-align:center;margin-bottom:28px;}
  h1{
    font-family:'Chakra Petch',sans-serif;
    font-weight:700;
    font-size:clamp(28px,5vw,42px);
    letter-spacing:4px;
    margin:0;
    color:var(--text);
    text-shadow:0 0 18px rgba(79,216,255,.45);
  }
  h1 span{color:var(--accent);}
  .sub{
    color:var(--text-dim);
    font-size:13px;
    letter-spacing:1px;
    margin-top:8px;
    text-transform:uppercase;
  }

  .panel{
    background:linear-gradient(180deg, rgba(20,42,84,.55), rgba(10,22,48,.55));
    border:1px solid var(--panel-line);
    border-radius:10px;
    padding:18px;
    box-shadow: inset 0 0 40px rgba(79,216,255,.03);
  }

  form.guess-form{
    display:flex;
    gap:10px;
    margin-bottom:10px;
  }
  input#guessInput{
    flex:1;
    background:#081328;
    border:1px solid var(--panel-line);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    padding:12px 14px;
    border-radius:6px;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input#guessInput:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(79,216,255,.15);
  }
  button#guessBtn{
    background:var(--accent);
    color:#03121f;
    border:none;
    font-family:'Chakra Petch',sans-serif;
    font-weight:700;
    letter-spacing:1px;
    padding:0 22px;
    border-radius:6px;
    cursor:pointer;
    text-transform:uppercase;
    font-size:14px;
    transition:filter .15s, transform .1s;
  }
  button#guessBtn:hover{filter:brightness(1.15);}
  button#guessBtn:active{transform:scale(.97);}
  button#guessBtn:disabled{opacity:.4;cursor:not-allowed;}

  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:var(--text-dim);
    font-size:12px;
    margin-bottom:14px;
    letter-spacing:.5px;
  }
  .meta-row #guessCount{color:var(--accent);}

  #errorMsg{
    color:var(--bad);
    font-size:13px;
    min-height:18px;
    margin:-2px 0 10px 2px;
  }

  .table-scroll{overflow-x:auto;}
  table{
    width:100%;
    border-collapse:collapse;
    min-width:640px;
  }
  thead th{
    font-family:'Chakra Petch',sans-serif;
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    text-align:left;
    padding:8px 10px;
    border-bottom:1px solid var(--panel-line);
  }
  tbody td{
    padding:10px;
    font-size:14px;
    border-bottom:1px solid rgba(27,53,104,.5);
    white-space:nowrap;
  }
  tbody tr.reveal{
    animation:reveal .35s ease forwards;
  }
  @keyframes reveal{
    from{opacity:0; transform:translateY(-6px);}
    to{opacity:1; transform:translateY(0);}
  }
  .cell{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:4px 9px;
    border-radius:5px;
    font-weight:600;
  }
  .cell.correct{color:var(--good); background:rgba(57,224,122,.1);}
  .cell.wrong{color:var(--bad); background:rgba(255,84,104,.1);}
  .arrow{font-size:11px;opacity:.85;}

  .name-cell{
    font-family:'Chakra Petch',sans-serif;
    font-weight:600;
    color:var(--text);
  }

  #emptyState{
    color:var(--text-dim);
    font-size:13px;
    padding:18px 4px;
    text-align:center;
  }

  #winBanner{
    display:none;
    margin-top:18px;
    text-align:center;
    padding:16px;
    border-radius:8px;
    border:1px solid rgba(57,224,122,.4);
    background:rgba(57,224,122,.08);
    color:var(--good);
    font-family:'Chakra Petch',sans-serif;
    font-weight:700;
    letter-spacing:1px;
    font-size:15px;
  }

  #confettiCanvas{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:50;
  }

  datalist{display:none;}

  footer{
    text-align:center;
    color:var(--text-dim);
    font-size:11px;
    margin-top:24px;
    opacity:.6;
  }
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div class="wrap">
  <header>
    <h1>STAR<span>DLE</span></h1>
    <div class="sub">Guess today's Star Conflict ship</div>
  </header>

  <div class="panel">
    <form class="guess-form" id="guessForm" autocomplete="off">
      <input
        id="guessInput"
        type="text"
        list="shipList"
        placeholder="Type a ship name…"
        autocomplete="off"
        spellcheck="false"
      />
      <datalist id="shipList"></datalist>
      <button id="guessBtn" type="submit">Guess</button>
    </form>

    <div class="meta-row">
      <span>Attempts: <span id="guessCount">0</span></span>
      <span id="dayLabel"></span>
    </div>

    <div id="errorMsg"></div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Role</th>
            <th>Faction</th>
            <th>Color</th>
            <th>Rank</th>
          </tr>
        </thead>
        <tbody id="guessRows"></tbody>
      </table>
      <div id="emptyState">No guesses yet — start typing a ship name above.</div>
    </div>

    <div id="winBanner"></div>
  </div>

  <footer>New ship every day, at midnight local time. Ship data loaded from ships.json.</footer>
</div>

<script src="app.js"></script>
</body>
</html>
